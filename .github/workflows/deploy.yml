name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: |
          echo "Building with GITHUB_REPOSITORY=${{ github.repository }}"
          echo "Building with NODE_ENV=production"
          npm run build:gh-pages
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          NODE_ENV: production

      - name: Verify build output
        run: |
          echo "Verifying build output..."
          if [ ! -f dist/index.html ]; then
            echo "❌ dist/index.html not found"
            exit 1
          fi
          echo "✅ dist/index.html exists"
          echo "First 30 lines of dist/index.html:"
          head -30 dist/index.html
          if ! grep -q 'Ejercito-Reforestador-Wallet\|assets/' dist/index.html; then
            echo "⚠️ Unexpected index.html content (missing base/assets)"
            exit 1
          fi
          echo "✅ Build looks ready for GitHub Pages"

      - name: Disable Jekyll
        run: |
          touch dist/.nojekyll
          echo "✅ .nojekyll file created"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
